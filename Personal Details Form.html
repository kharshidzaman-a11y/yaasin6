<!DOCTYPE html>
<html>
    <head>
        <title>form</title>
    </head>
    <body>
        <h1>Personal Details Form</h1>
        <label>Name</label><br>
        <input type="text" id="name"><br><br>
        <label>Email ID</label><br>
        <input type="text" id="email"><br><br>
        <label>Contact Number (This will be hidden)</label><br>
        <input type="password" id="contact"><br><br>
        <label>Gender</label><br>
        <input type="radio" id="female" name="gender" value="female">female<br><br>
        <input type="radio" id="male" name="gender" value="male">male<br><br>
        <label>Favourite city</label><br>
        <input type="checkbox" id="city" value="New Delhi">new Delhi<br><br>
        <input type="checkbox" id="male" value="mumbai">mumbai<br><br>
        <input type="submit">
    </body>
</html>
