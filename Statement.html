<!DOCTYPE html>
<html>
    <body>
        <h2>Javascript Statement</h2>

        <p>A <b>Javascript programs</b> is a list of
        <b>statement</b> to be executed by a computer. </p>

        <p id="demo"></p>

        <script>
            var x, y, z; 
            x = 5;
            y = 6;
            z = x + y;
            
            document.getElementById("demo").innerHTML = "The value of z is: " + z + " . ";
        </script>
    </body>
</html>
