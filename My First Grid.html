<!DOCTYPE html>
<html>
    <head>
        <title>My Hobby Cards</title>
        <link rel="stylesheet"href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

        <style>
            body {
                background-color: #f9f9f9;
                font-family: Arial, sans-serif;
                padding: 30px 15px;
            }
            h1 {
                text-align: center;
                color: #ff5a43;
            }
            .hobby-card {
                text-align: center;
                border: 2px solid #ff5a43;
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 20px;
                background-color: #fff8e1;
            }
        </style>
    </head>
    <body>
         
        <h1>My hobby Cards</h1>

        <div class="container">

            <div class="row">


                <div class="col-12 col-md-6 col-lg-4">
                    <div class="hobby-card">
                        <h3>Drawing</h3>
                        <p>I love sketching animals and cosmic character</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="hobby-card">
                        <h3>Football</h3>
                        <p>i play football every evening with my friends</p>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="hobby-card">
                        <h3>Reading</h3>
                        <p>My favourite books are adventure stories</p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
